# cc-deepfeed configuration
# Copy this to config.yaml and customize your topics and feeds.
#
# Architecture:
#   topics  — what to research (global, defined once)
#   feeds   — personalized RSS feeds that subscribe to topics
#
# A topic is researched once per cycle. Entries are automatically
# distributed to all feeds that subscribe to that topic.

settings:
  feeds_dir: ./feeds
  state_dir: ./.state
  max_entries: 50                # per feed, oldest pruned automatically
  base_url: "https://yourusername.github.io/cc-deepfeed"

  # Uncomment for instant feed reader updates (Feedly, etc.):
  # websub_hub: "https://pubsubhubbub.appspot.com"

topics:
  # Each topic needs a matching brief file in .claude/agents/topics/<id>.md
  # See .claude/agents/topics/_template.md for the brief format.

  - id: ai-research
    name: "AI Research Highlights"
    depth: deep             # quick (~200w) | standard (~400w) | deep (~600-800w)
    language: en            # en (default) or zh
    target: 3               # mandatory entries per research cycle

  - id: world-news
    name: "World News Briefing"
    depth: standard
    language: en
    target: 4
    model: sonnet           # optional: sonnet for cheaper factual work (default: opus)

  - id: product-design
    name: "Product Design Trends / 产品设计趋势"
    depth: deep
    language: en
    bilingual: zh           # optional: append translation in secondary language
    target: 3

feeds:
  - id: my-feed
    combined_feed: daily-briefings       # becomes feeds/daily-briefings.xml
    feed_name: "My Research Feed"
    feed_description: "Deep research briefings powered by Claude"
    topics: [ai-research, world-news]    # subscribe to any topic IDs above

  # Add more feeds for different people or use cases:
  # - id: team-feed
  #   combined_feed: team-briefings
  #   feed_name: "Team Research Feed"
  #   feed_description: "Shared team briefings"
  #   topics: [ai-research]
